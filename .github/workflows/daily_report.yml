name: daily-report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"  # 한국시간 오전 7시

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show files
        run: |
          echo "현재 위치:"
          pwd
          echo "저장소 파일 목록:"
          ls -al
          echo "Python 버전:"
          python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt 파일이 없습니다."
          fi
          pip list

      - name: Check Python file
        run: |
          echo "daily_report.py 존재 여부 확인"
          ls -al daily_report.py
          python -m py_compile daily_report.py
          
      - name: Run daily report
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set -e
          python daily_report.py
