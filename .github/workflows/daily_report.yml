name: Daily KRX Screening Report

on:
  schedule:
    # 한국시간 매일 오전 7시 = UTC 전날 22시
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy openpyxl xlsxwriter

      - name: Run daily KRX report
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python daily_report.py
